<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — All Import Store</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body {
            background: #1e293b;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }
        .login-card {
            background: #fff;
            border-radius: 14px;
            padding: 2.5rem 2rem;
            width: 100%;
            max-width: 380px;
            box-shadow: 0 25px 60px rgba(0,0,0,.35);
        }
        .brand-icon {
            width: 56px; height: 56px;
            background: #6366f1;
            border-radius: 14px;
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 1rem;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="text-center mb-4">
            <div class="brand-icon">
                <i class="bi bi-boxes text-white" style="font-size:1.75rem;"></i>
            </div>
            <h4 class="fw-bold mb-1">All Import Store</h4>
            <p class="text-muted small mb-0">Faça login para continuar</p>
        </div>

        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="alert alert-{{ category }} py-2 small">{{ message }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <form method="POST">
            <div class="mb-3">
                <label class="form-label fw-semibold small">Email</label>
                <input type="email" name="email" class="form-control"
                       placeholder="seu@email.com" required autofocus>
            </div>
            <div class="mb-4">
                <label class="form-label fw-semibold small">Senha</label>
                <input type="password" name="senha" class="form-control"
                       placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn w-100 text-white fw-semibold"
                    style="background:#6366f1;">
                <i class="bi bi-box-arrow-in-right me-2"></i> Entrar
            </button>
        </form>

        <p class="text-center text-muted mt-4 mb-0" style="font-size:.75rem;">
            Acesso padrão: <strong>admin@sistema.com</strong> / <strong>admin123</strong>
        </p>
    </div>
</body>
</html>
