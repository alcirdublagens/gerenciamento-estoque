{% extends "base.html" %}
{% block title %}{{ 'Editar Cliente' if cliente else 'Novo Cliente' }} — All Import Store{% endblock %}
{% block page_title %}{{ 'Editar Cliente' if cliente else 'Novo Cliente' }}{% endblock %}
{% block content %}

<div class="row justify-content-center">
    <div class="col-md-9 col-lg-7">
        <div class="card border-0 shadow-sm">
            <div class="card-body p-4">
                <form method="POST">
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Nome <span class="text-danger">*</span></label>
                        <input type="text" name="nome" class="form-control" required
                               value="{{ cliente.nome if cliente else '' }}"
                               placeholder="Nome completo">
                    </div>

                    <div class="row g-3 mb-3">
                        <div class="col-sm-6">
                            <label class="form-label fw-semibold">Documento</label>
                            <input type="text" name="identificacao" class="form-control"
                                   value="{{ cliente.identificacao if cliente else '' }}"
                                   placeholder="CPF, passaporte, etc.">
                        </div>
                        <div class="col-sm-6">
                            <label class="form-label fw-semibold">Telefone</label>
                            <input type="text" name="telefone" class="form-control"
                                   value="{{ cliente.telefone if cliente else '' }}"
                                   placeholder="+55 (00) 00000-0000">
                        </div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-semibold">Email</label>
                        <input type="email" name="email" class="form-control"
                               value="{{ cliente.email if cliente else '' }}"
                               placeholder="email@exemplo.com">
                    </div>

                    <div class="mb-4">
                        <label class="form-label fw-semibold">Endereço</label>
                        <textarea name="endereco" class="form-control" rows="2"
                                  placeholder="Rua, número, bairro, cidade, estado">{{ cliente.endereco if cliente else '' }}</textarea>
                    </div>

                    <div class="d-flex gap-2 justify-content-end">
                        <a href="{{ url_for('clientes.index') }}" class="btn btn-outline-secondary">Cancelar</a>
                        <button type="submit" class="btn text-white fw-semibold" style="background:#6366f1;">
                            <i class="bi bi-check-lg me-1"></i>
                            {{ 'Salvar Alterações' if cliente else 'Cadastrar Cliente' }}
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

{% endblock %}
