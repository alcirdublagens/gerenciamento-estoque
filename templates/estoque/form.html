{% extends "base.html" %}
{% block title %}{{ 'Editar Produto' if produto else 'Novo Produto' }} — All Import Store{% endblock %}
{% block page_title %}{{ 'Editar Produto' if produto else 'Novo Produto' }}{% endblock %}
{% block content %}

<div class="row justify-content-center">
    <div class="col-md-9 col-lg-8">
        <div class="card border-0 shadow-sm">
            <div class="card-body p-4">
                <form method="POST">
                    <div class="row g-3 mb-3">
                        <div class="col-sm-8">
                            <label class="form-label fw-semibold">Nome <span class="text-danger">*</span></label>
                            <input type="text" name="nome" class="form-control" required
                                   value="{{ produto.nome if produto else '' }}"
                                   placeholder="Nome do produto">
                        </div>
                        <div class="col-sm-4">
                            <label class="form-label fw-semibold">Tag / Categoria</label>
                            <input type="text" name="tag" class="form-control"
                                   value="{{ produto.tag if produto else '' }}"
                                   placeholder="Ex: Bebidas, Eletrônico">
                        </div>
                    </div>

                    <div class="row g-3 mb-3">
                        <div class="col-sm-6">
                            <label class="form-label fw-semibold">Código</label>
                            <input type="text" name="codigo" class="form-control"
                                   value="{{ produto.codigo if produto else '' }}"
                                   placeholder="Código de barras, SKU (opcional)">
                        </div>
                        <div class="col-sm-6">
                            <label class="form-label fw-semibold">Descrição</label>
                            <input type="text" name="descricao" class="form-control"
                                   value="{{ produto.descricao if produto else '' }}"
                                   placeholder="Descrição breve (opcional)">
                        </div>
                    </div>

                    <div class="row g-3 mb-4">
                        <div class="col-sm-3">
                            <label class="form-label fw-semibold">Preço de Venda <span class="text-danger">*</span></label>
                            <div class="input-group">
                                <span class="input-group-text">R$</span>
                                <input type="number" name="preco" class="form-control"
                                       step="0.01" min="0" required
                                       value="{{ '%.2f'|format(produto.preco) if produto else '0.00' }}">
                            </div>
                        </div>
                        <div class="col-sm-3">
                            <label class="form-label fw-semibold">Preço de Custo</label>
                            <div class="input-group">
                                <span class="input-group-text">R$</span>
                                <input type="number" name="preco_custo" class="form-control"
                                       step="0.01" min="0"
                                       value="{{ '%.2f'|format(produto.preco_custo) if produto else '0.00' }}">
                            </div>
                        </div>
                        <div class="col-sm-3">
                            <label class="form-label fw-semibold">Quantidade</label>
                            <input type="number" name="quantidade" class="form-control" min="0"
                                   value="{{ produto.quantidade if produto else '0' }}">
                        </div>
                        <div class="col-sm-3">
                            <label class="form-label fw-semibold">Estoque Mínimo</label>
                            <input type="number" name="estoque_minimo" class="form-control" min="0"
                                   value="{{ produto.estoque_minimo if produto else '5' }}">
                            <div class="form-text">Alerta abaixo deste valor.</div>
                        </div>
                    </div>

                    <div class="d-flex gap-2 justify-content-end">
                        <a href="{{ url_for('estoque.index') }}" class="btn btn-outline-secondary">Cancelar</a>
                        <button type="submit" class="btn text-white fw-semibold" style="background:#6366f1;">
                            <i class="bi bi-check-lg me-1"></i>
                            {{ 'Salvar Alterações' if produto else 'Cadastrar Produto' }}
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

{% endblock %}
